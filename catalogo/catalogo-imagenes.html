<script>
(function () {
    'use strict';

    // ── Configuración ─────────────────────────────────────────────────────────

    // Imágenes para cursos PNT según keywords en el título
    // Sincronizar con pnts/images.json
    const PNT_CATEGORIAS = [
        { keywords: ['ohss', 'ovarian'],                       imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/clinica.png' },
        { keywords: ['serology', 'serolog', 'consent'],        imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/serologia.png' },
        { keywords: ['adenomios'],                             imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/clinica.png' },
        { keywords: ['vitrif', 'desvitrif'],                   imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/vitrificacion.png' },
        { keywords: ['laborator', 'lab', 'nota técnica', 'parada'], imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/laboratorio.png' },
        { keywords: ['visita', 'infertil'],                    imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/infertilidad.png' },
        { keywords: ['biovigilancia', 'biovigilance'],         imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/biovigilancia.png' },
        { keywords: ['embrion', 'embryo', 'thaw'],             imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/embrion.png' },
        { keywords: ['trazabilidad', 'muestras', 'biológic'],  imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/trazabilidad.png' },
        { keywords: ['alerta', 'seguridad', 'geneseeker'],     imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/seguridad.png' },
        { keywords: ['documentac', 'gestión', 'clínica'],      imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/documentacion.png' },
        { keywords: ['genetic', 'genétic'],                    imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/genetica.png' },
        { keywords: ['standard', 'estándar', 'sop', 'pnt'],   imagen: 'https://ivirmacampus.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/laboratorio.png' }
    ];

    const PNT_DEFAULT_IMAGE = 'https://ivirma.actuatxp.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/default-lab.png';

    // URL base de imágenes por id_netex (cursos no-PNT)
    const NETEX_IMAGE_BASE = 'https://apps.ivieducationcloud.com/campus_neo_course_images/';

    // Altura de la imagen de la tarjeta (se aplica via inline style, sobreescribe CSS)
    const IMAGE_HEIGHT = '190px';  // ← cambia este valor

    // Badge LFE
    const LFE_BADGE = {
        url:   'https://ivirma.actuatxp.com/pluginfile.php/1/local_uploadfiles/additionalimages/0/LFE-badge.png',
        width: '34px',   // ← cambia este valor para ajustar el tamaño
        top:   '12px',
        right:  '10px'
    };

    // ── Helpers ───────────────────────────────────────────────────────────────

    function getTitle(card) {
        const el = card.querySelector('.tw-catalogItemNarrow__title');
        return el ? el.textContent.trim() : '';
    }

    function isPnt(title) {
        return title.toUpperCase().includes('PNT');
    }

    // Devuelve true si alguna opción LFE del filtro_bloque está activa en el sidebar
    function lfeFilterActive() {
        var selector = '[data-tw-selectmulti-key="cfp_menu_filtrobloquemla_39281"]';
        var filterEl = document.querySelector(selector);
        if (!filterEl) return false;
        var activeOptions = filterEl.querySelectorAll('[aria-selected="true"]');
        for (var i = 0; i < activeOptions.length; i++) {
            var label = activeOptions[i].querySelector('.tw-selectMulti__link_text');
            if (label && label.textContent.trim().toUpperCase().includes('LFE')) return true;
        }
        return false;
    }

    function isLfe(card) {
        // Si el filtro LFE está activo, todos los cursos visibles son LFE
        if (lfeFilterActive()) return true;
        // Fallback: título contiene "Learning for Excellence" o "LFE"
        var title = card.querySelector('.tw-catalogItemNarrow__title');
        if (!title) return false;
        var t = title.textContent.toUpperCase();
        return t.includes('LFE') || t.includes('LEARNING FOR EXCELLENCE');
    }

    function resolvePntImage(title) {
        const lower = title.toLowerCase();
        const match = PNT_CATEGORIAS.find(cat =>
            cat.keywords.some(kw => lower.includes(kw.toLowerCase()))
        );
        return match ? match.imagen : PNT_DEFAULT_IMAGE;
    }

    // Extrae el id_netex del campo oculto de la tarjeta
    function extractIdNetex(card) {
        const items = card.querySelectorAll('.tw-catalogItemNarrow__textarea_group_item');
        for (const item of items) {
            const text = item.textContent.trim();
            if (text.toLowerCase().includes('id_netex:')) {
                item.setAttribute('style', 'display:none !important');
                item.classList.add('hidden-element');
                const match = text.match(/id_netex:\s*(\d+)/i);
                return match ? match[1] : null;
            }
        }
        return card.getAttribute('data-id-netex-value') || null;
    }

    // ── Aplicar background con guardia anti-bucle ─────────────────────────────

    function applyBackground(imageEl, imageUrl) {
        var newBg = "url('" + imageUrl + "')";
        if (imageEl.style.backgroundImage === newBg) return;
        imageEl.style.backgroundImage    = newBg;
        imageEl.style.backgroundSize     = 'cover';
        imageEl.style.backgroundPosition = 'center';
        imageEl.style.backgroundRepeat   = 'no-repeat';
    }

    // ── Lógica principal por tarjeta ──────────────────────────────────────────

    // Badge LFE — siempre se comprueba, independientemente de data-cat-img-done
    function applyLfeBadge(card) {
        if (!isLfe(card)) return;
        const imageContainer = card.querySelector('.tw-catalogItemNarrow__image');
        if (!imageContainer || imageContainer.querySelector('.lfe-badge')) return;
        const badge = document.createElement('img');
        badge.className = 'lfe-badge';
        badge.src = LFE_BADGE.url;
        badge.alt = 'LFE';
        badge.style.cssText = 'position:absolute;top:' + LFE_BADGE.top + ';right:' + LFE_BADGE.right + ';width:' + LFE_BADGE.width + ';height:auto;z-index:20;pointer-events:none;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35))';
        imageContainer.appendChild(badge);
    }

    function procesarCard(card) {
        // El badge se aplica siempre (incluso en tarjetas ya procesadas)
        applyLfeBadge(card);

        // La imagen solo se asigna una vez
        if (card.getAttribute('data-cat-img-done') === 'true') return;

        // Aplicar altura fija via inline style (sobreescribe cualquier CSS)
        var imageBox   = card.querySelector('.tw-catalogItemNarrow__image');
        var imageRatio = card.querySelector('.tw-catalogItemNarrow__image_ratio');
        var imageImg   = card.querySelector('.tw-catalogItemNarrow__image_ratio_img');
        if (imageBox) {
            imageBox.style.cssText = 'padding-top:0 !important;height:' + IMAGE_HEIGHT + ';min-height:' + IMAGE_HEIGHT + ';position:relative;overflow:hidden';
        }
        if (imageRatio) {
            imageRatio.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden';
        }
        if (imageImg) {
            imageImg.style.position   = 'absolute';
            imageImg.style.top        = '0';
            imageImg.style.left       = '0';
            imageImg.style.width      = '100%';
            imageImg.style.height     = '100%';
            imageImg.style.backgroundSize     = 'cover';
            imageImg.style.backgroundPosition = 'center';
            imageImg.style.backgroundRepeat   = 'no-repeat';
        }

        const title   = getTitle(card);
        const idNetex = extractIdNetex(card);
        const imageEl = card.querySelector('.tw-catalogItemNarrow__image_ratio_img');

        if (imageEl) {
            if (isPnt(title)) {
                applyBackground(imageEl, resolvePntImage(title));
            } else if (idNetex) {
                var candidata = NETEX_IMAGE_BASE + idNetex + '_dashboard.jpg';
                var probe = new Image();
                probe.onload  = function () { applyBackground(imageEl, candidata); };
                probe.onerror = function () { applyBackground(imageEl, PNT_DEFAULT_IMAGE); };
                probe.src = candidata;
            }
        }

        card.setAttribute('data-cat-img-done', 'true');
        if (idNetex) card.setAttribute('data-id-netex-value', idNetex);
    }

    // ── Procesar todas las tarjetas visibles ──────────────────────────────────

    function procesarTodo() {
        document.querySelectorAll('.tw-catalogItemNarrow').forEach(procesarCard);
    }

    // ── Estilos para elementos ocultos ────────────────────────────────────────

    function addHiddenStyle() {
        if (document.getElementById('catalogo-imagenes-style')) return;
        const style = document.createElement('style');
        style.id = 'catalogo-imagenes-style';
        style.textContent = '.hidden-element { display:none !important; }';
        document.head.appendChild(style);
    }

    // ── Observer: detecta tarjetas nuevas o cambios de style por scripts externos ──

    function observar() {
        const container = document.querySelector('section.tw-grid[role="list"]') || document.body;

        const observer = new MutationObserver(function (mutations) {
            let necesitaProcesar = false;
            mutations.forEach(function (m) {
                if (m.type === 'childList') {
                    necesitaProcesar = true;
                }
                if (
                    m.type === 'attributes' &&
                    m.attributeName === 'style' &&
                    m.target.classList.contains('tw-catalogItemNarrow__image_ratio_img')
                ) {
                    const card = m.target.closest('.tw-catalogItemNarrow');
                    if (card) {
                        // Un script externo cambió el style: quitamos nuestro flag y reaplicamos
                        card.removeAttribute('data-cat-img-done');
                        procesarCard(card);
                    }
                }
            });
            if (necesitaProcesar) procesarTodo();
        });

        observer.observe(container, {
            childList:       true,
            subtree:         true,
            attributes:      true,
            attributeFilter: ['style']
        });
    }

    // ── Listeners para carga dinámica (scroll, clic, filtros) ─────────────────

    function setupListeners() {
        const main = document.getElementById('region-main') || document.body;

        main.addEventListener('click', function () {
            setTimeout(procesarTodo, 300);
        });

        window.addEventListener('scroll', function () {
            clearTimeout(window._catalogoScrollTimer);
            window._catalogoScrollTimer = setTimeout(procesarTodo, 300);
        });
    }

    // ── Observer sobre el filtro_bloque para re-badgear al cambiar filtro ────────

    function observarFiltro() {
        var selector = '[data-tw-selectmulti-key="cfp_menu_filtrobloquemla_39281"]';

        function watchFilter() {
            var filterEl = document.querySelector(selector);
            if (!filterEl) return;

            var obs = new MutationObserver(function () {
                // Al cambiar el filtro, quitar badges existentes y re-aplicar
                document.querySelectorAll('.lfe-badge').forEach(function (b) { b.remove(); });
                setTimeout(procesarTodo, 400);
            });

            obs.observe(filterEl, { attributes: true, subtree: true, attributeFilter: ['aria-selected'] });
        }

        // Esperar a que el filtro esté en el DOM
        [300, 800, 1500].forEach(function (ms) { setTimeout(watchFilter, ms); });
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    function init() {
        addHiddenStyle();
        procesarTodo();
        observar();
        setupListeners();
        observarFiltro();
        [500, 1200, 2500].forEach(function (ms) { setTimeout(procesarTodo, ms); });
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        init();
    } else {
        document.addEventListener('DOMContentLoaded', init);
    }

    window.addEventListener('load', procesarTodo);

})();
</script>
