<!-- ============================================================
     EXPEDIENTE — Cursos como cards (.exp-card, estilo one-tech)

     Qué hace:
     - Lee las tablas de reportbuilder del Expediente: "Formación finalizada"
       (inst8148) y "Formación en curso" (inst8154).
     - Construye un selector de tabs (.dai-filters) entre ambas secciones.
     - Por cada curso genera una .exp-card con la imagen del curso (fetch a la
       página del curso, .asimage), título en overlay y badges de Tipo de curso,
       Fecha de inscripción y Fecha de finalización.
     - Si una sección no tiene cursos, muestra un aviso one-tech en color
       corporativo (.dai-empty-notice--corp).

     Estilos: reutiliza los globales de css-totara-organizado.css
     (.dai-wrap, .dai-filters, .dai-filter-btn, .cyber-standalone__grid,
      .dai-empty-notice + variante --corp). Cards propias: .exp-card*, .exp-badge*.
     ============================================================ -->
<script>
(function () {
    'use strict';

    const CONFIG = {
        // Bloques de informe del Expediente (en orden de aparición)
        sections: [
            { key: 'finalizada', blockId: 'inst8148', label: 'Formación finalizada' },
            { key: 'encurso',    blockId: 'inst8154', label: 'Formación en curso' }
        ],
        debug: true
    };

    // Cache de imágenes de curso por URL para no repetir fetch
    const imageCache = {};

    function log(message, data) {
        if (CONFIG.debug) console.log('[Expediente] ' + message, data || '');
    }

    function escapeHtml(s) {
        return (s || '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Normaliza &nbsp; ( ) a espacio antes de trim (trim no lo elimina)
    function cellText(row, columnClass) {
        const cell = row.querySelector('td.' + columnClass);
        if (!cell) return '';
        return (cell.textContent || '').replace(/\u00a0/g, ' ').trim();
    }

    // Fecha de completado del curso: prueba varias columnas del informe
    // (la de "Fecha de finalización del curso" primero) y cae a course_enddate.
    function completionDate(row) {
        const candidates = [
            'course_completion_completeddate',
            'course_completion_timecompleted',
            'course_completion_datefinished',
            'course_enddate'
        ];
        for (let i = 0; i < candidates.length; i++) {
            const t = cellText(row, candidates[i]);
            if (t && t !== '-') return t;
        }
        return '';
    }

    // Lee el % de progreso de la celda course_completion_progresspercent
    function extractProgress(row) {
        const cell = row.querySelector('td.course_completion_progresspercent');
        if (!cell) return null;
        const bar = cell.querySelector('.bar[aria-valuenow]');
        if (bar) {
            const v = parseInt(bar.getAttribute('aria-valuenow'), 10);
            if (!isNaN(v)) return v;
        }
        const txt = cell.querySelector('.progressbar__text');
        if (txt) {
            const m = (txt.textContent || '').match(/(\d+)/);
            if (m) return parseInt(m[1], 10);
        }
        return null;
    }

    // Devuelve la lista de cursos de un bloque, o null si el bloque no existe
    function extractCourses(blockId, sectionKey) {
        const block = document.getElementById(blockId);
        if (!block) return null;
        const table = block.querySelector('table.reportbuilder-table');
        if (!table) return [];            // bloque presente pero sin tabla (vacío)

        const courses = [];
        table.querySelectorAll('tbody > tr').forEach(row => {
            const link = row.querySelector('td.course_courselink a');
            if (!link) return;
            let progress = extractProgress(row);
            // Los cursos de "Formación finalizada" están completados → 100%
            if (sectionKey === 'finalizada') progress = 100;
            if (progress === null) progress = 0;
            courses.push({
                url:          link.getAttribute('href') || '#',
                titulo:       (link.textContent || '').trim(),
                tipo:         cellText(row, 'course_category_name'),
                inscripcion:  cellText(row, 'course_completion_enrolleddate'),
                finalizacion: completionDate(row),
                progress:     progress,
                imagen:       ''
            });
        });
        return courses;
    }

    // Extrae la imagen de un curso de su página (.asimage background-image)
    async function fetchCourseImage(url) {
        if (!url || url === '#') return '';
        if (imageCache[url] !== undefined) return imageCache[url];
        try {
            const res = await fetch(url, { credentials: 'same-origin' });
            if (!res.ok) { imageCache[url] = ''; return ''; }
            const doc = new DOMParser().parseFromString(await res.text(), 'text/html');
            let img = '';
            const asimage = doc.querySelector('.asimage');
            if (asimage) {
                const m = (asimage.getAttribute('style') || '')
                    .match(/background-image\s*:\s*url\(["']?([^"')]+)["']?\)/);
                if (m) img = m[1];
            }
            if (!img) {
                const og = doc.querySelector('meta[property="og:image"]');
                if (og) img = og.getAttribute('content') || '';
            }
            imageCache[url] = img;
            return img;
        } catch (err) {
            log('Error al obtener imagen de ' + url, err);
            imageCache[url] = '';
            return '';
        }
    }

    function badge(variant, iconClass, text) {
        return '<span class="exp-badge exp-badge--' + variant + '">' +
               '<i class="' + iconClass + '"></i> ' + escapeHtml(text) + '</span>';
    }

    function buildCard(course) {
        const card = document.createElement('a');
        card.className = 'exp-card';
        card.href = course.url;
        card.target = '_blank';
        card.rel = 'noopener';

        const completed = course.progress >= 100;

        const badges = [];
        if (course.tipo) badges.push(badge('type', 'fa-regular fa-folder-open', course.tipo));
        badges.push(badge('enrol', 'fa-regular fa-calendar-plus',
            'Inscripción: ' + (course.inscripcion || '—')));

        // Estado en la esquina superior de la imagen (Finalizado / En curso)
        const statusIcon = completed ? 'fa-regular fa-circle-check' : 'fa-regular fa-clock';
        const statusText = completed
            ? ('Finalizado' + (course.finalizacion ? ': ' + course.finalizacion : ''))
            : 'En curso';
        const statusBadge =
            '<span class="exp-status exp-status--' + (completed ? 'done' : 'pending') + '">' +
                '<i class="' + statusIcon + '"></i> ' + escapeHtml(statusText) +
            '</span>';

        const bgStyle = course.imagen
            ? ' style="background-image:url(\'' + course.imagen + '\')"' : '';

        const progressLabel = course.progress + '%';

        card.innerHTML =
            '<div class="exp-card__image">' +
                '<div class="exp-card__bg"' + bgStyle + '></div>' +
                statusBadge +
                '<div class="exp-card__overlay">' +
                    '<strong class="exp-card__overlay-title">' + escapeHtml(course.titulo) + '</strong>' +
                '</div>' +
            '</div>' +
            '<div class="exp-card__body">' +
                '<div class="exp-badges">' + badges.join('') + '</div>' +
                '<div class="exp-progress' + (completed ? ' exp-progress--done' : '') + '">' +
                    '<div class="exp-progress__track">' +
                        '<div class="exp-progress__fill" style="width:' + course.progress + '%"></div>' +
                    '</div>' +
                    '<span class="exp-progress__label">' + progressLabel + '</span>' +
                '</div>' +
            '</div>';

        return card;
    }

    function emptyNoticeHtml() {
        return '<li class="dai-empty-notice dai-empty-notice--corp">' +
                   '<span class="dai-empty-notice__icon">' +
                       '<i class="fa fa-info-circle" aria-hidden="true"></i>' +
                   '</span>' +
                   'No hay formaciones disponibles en esta sección.' +
               '</li>';
    }

    function renderGrid(ul, courses) {
        ul.innerHTML = '';
        if (!courses || courses.length === 0) {
            ul.className = 'exp-grid--empty';
            ul.innerHTML = emptyNoticeHtml();
            return;
        }
        ul.className = 'cyber-standalone__grid cols-3';
        courses.forEach(course => {
            const li = document.createElement('li');
            const card = buildCard(course);
            li.appendChild(card);
            ul.appendChild(li);
            // Imagen progresiva: se rellena el fondo cuando resuelve el fetch
            fetchCourseImage(course.url).then(img => {
                if (!img) return;
                const bg = card.querySelector('.exp-card__bg');
                if (bg) bg.style.backgroundImage = "url('" + img + "')";
            });
        });
    }

    // Título traducido del bloque (h2). Si no está, usa el label de config.
    function blockLabel(blockId, fallback) {
        const block = document.getElementById(blockId);
        const h2 = block && block.querySelector('.block-title h2, .header .title h2, h2');
        const text = h2 ? (h2.textContent || '').trim() : '';
        return text || fallback;
    }

    function init() {
        // Leer datos de cada sección
        const data = CONFIG.sections.map(s => ({
            key:   s.key,
            label: blockLabel(s.blockId, s.label),
            blockId: s.blockId,
            courses: extractCourses(s.blockId, s.key)
        }));

        const present = data.filter(d => d.courses !== null);
        if (present.length === 0) {
            log('No hay bloques de expediente en esta página, omitiendo');
            return;
        }

        // Bloque anfitrión: el primer bloque presente (aloja el .dai-wrap)
        const hostData = present[0];
        const hostBlock = document.getElementById(hostData.blockId);
        const hostContent = hostBlock.querySelector('.content.block-content');
        if (!hostContent) { log('Sin .content en bloque anfitrión'); return; }

        // Evitar doble inicialización
        if (hostContent.querySelector('.dai-wrap')) return;

        // Tab activo por defecto: primera sección con cursos, si no la primera
        const withCourses = data.find(d => d.courses && d.courses.length > 0);
        const activeKey = withCourses ? withCourses.key : data[0].key;

        // Construir wrap + tabs + grid
        const wrap = document.createElement('div');
        wrap.className = 'dai-wrap';

        const filters = document.createElement('div');
        filters.className = 'dai-filters exp-filters';
        filters.setAttribute('role', 'tablist');

        data.forEach(d => {
            const btn = document.createElement('button');
            btn.className = 'dai-filter-btn' + (d.key === activeKey ? ' active' : '');
            btn.setAttribute('role', 'tab');
            btn.setAttribute('aria-selected', d.key === activeKey ? 'true' : 'false');
            btn.dataset.expTab = d.key;
            btn.textContent = d.label;
            filters.appendChild(btn);
        });

        const grid = document.createElement('ul');
        grid.className = 'cyber-standalone__grid cols-3';
        grid.id = 'exp-grid';

        wrap.appendChild(filters);
        wrap.appendChild(grid);

        // Ocultar contenido original del bloque anfitrión e inyectar el wrap
        Array.from(hostContent.children).forEach(ch => { ch.style.display = 'none'; });
        hostContent.appendChild(wrap);
        // Ocultar el resto de bloques de sección (sus datos ya se han leído)
        data.forEach(d => {
            if (d.blockId === hostData.blockId) return;
            const b = document.getElementById(d.blockId);
            if (b) b.style.display = 'none';
        });
        // Ocultar la cabecera del bloque anfitrión (las tabs hacen de título)
        const hostHeader = hostBlock.querySelector('.header.block-header');
        if (hostHeader) hostHeader.style.display = 'none';

        document.body.classList.add('exp-tiles-active');

        function selectTab(key) {
            filters.querySelectorAll('.dai-filter-btn').forEach(b => {
                const on = b.dataset.expTab === key;
                b.classList.toggle('active', on);
                b.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            const section = data.find(d => d.key === key);
            renderGrid(grid, section ? section.courses : []);
        }

        filters.addEventListener('click', e => {
            const btn = e.target.closest('.dai-filter-btn');
            if (btn) selectTab(btn.dataset.expTab);
        });

        selectTab(activeKey);
        log('Inicializado. Secciones: ' + data.map(d =>
            d.key + '=' + (d.courses ? d.courses.length : 'n/a')).join(', '));
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(init, 300));
    } else {
        setTimeout(init, 300);
    }
})();
</script>
